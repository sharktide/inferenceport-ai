name: Build

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
  push:
    branches: [main]
    paths:
      - "src/**"
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      accelerator:
        description: "GPU backend to build"
        type: choice
        required: false
        default: cpu
        options: [cpu, cuda, rocm, jetpack5, jetpack6]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'issue_comment' }}

jobs:
  build:
    if: ${{ github.event_name != 'issue_comment' || contains(github.event.comment.body, '!build') }}
    runs-on: ${{ matrix.os }}

    env:
      PR_COMMENT_MARKER: "<!-- BUILD-MATRIX-STATUS -->"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x86_64
            artifact: Electron-win64-build
            path: src/dist/*
            accel: cpu
            rust_target: x86_64-pc-windows-msvc

          - os: windows-11-arm
            name: Windows ARM64
            artifact: Electron-win-arm64-build
            path: src/dist/*
            accel: cpu
            rust_target: aarch64-pc-windows-msvc

          - os: macos-latest
            name: macOS ARM64
            artifact: Electron-mac-arm64-build
            path: src/dist/*.*
            accel: cpu
            rust_target: aarch64-apple-darwin

          - os: macos-15-intel
            name: macOS x86_64
            artifact: Electron-mac-x64-build
            path: src/dist/*.*
            accel: cpu
            rust_target: x86_64-apple-darwin

          - os: ubuntu-latest
            name: Linux x86_64
            artifact: Electron-linux-x64-build
            path: src/dist/*.*
            accel: cpu
            rust_target: x86_64-unknown-linux-gnu

          - os: ubuntu-24.04-arm
            name: Linux ARM64
            artifact: Electron-linux-arm64-build
            path: src/dist/*.*
            accel: cpu
            rust_target: aarch64-unknown-linux-gnu

          - os: windows-latest
            name: Windows CUDA
            artifact: Electron-win64-cuda
            path: src/dist/*.*
            accel: cuda
            rust_target: x86_64-pc-windows-msvc

          - os: ubuntu-latest
            name: Linux CUDA x86_64
            artifact: Electron-linux-cuda
            path: src/dist/*.*
            accel: cuda
            rust_target: x86_64-unknown-linux-gnu

          - os: ubuntu-24.04-arm
            name: Linux ARM CUDA
            artifact: Electron-linux-arm-cuda
            path: src/dist/*.*
            accel: cuda
            rust_target: aarch64-unknown-linux-gnu

          - os: windows-latest
            name: Windows ROCm
            artifact: Electron-win64-rocm
            path: src/dist/*.*
            accel: rocm
            rust_target: x86_64-pc-windows-msvc

          - os: ubuntu-latest
            name: Linux ROCm
            artifact: Electron-linux-rocm
            path: src/dist/*.*
            accel: rocm
            rust_target: x86_64-unknown-linux-gnu

          - os: ubuntu-24.04-arm
            name: JetPack 5
            artifact: Electron-jetpack5
            path: src/dist/*.*
            accel: jetpack5
            rust_target: aarch64-unknown-linux-gnu

          - os: ubuntu-24.04-arm
            name: JetPack 6
            artifact: Electron-jetpack6
            path: src/dist/*.*
            accel: jetpack6
            rust_target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      # ── Windows: long-path support + disable Defender real-time scanning ──
      - name: Windows – enable long paths
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          git config --global core.longpaths true
          Set-ItemProperty `
            -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' `
            -Name LongPathsEnabled -Value 1

      - name: Windows – disable Defender real-time monitoring
        if: runner.os == 'Windows'
        shell: powershell
        run: Set-MpPreference -DisableRealtimeMonitoring $true

      # ── Rust (required for napi:build) ────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/lib

      # ── Node ──────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Set accelerator env
        shell: bash
        run: |
          echo "ACCELERATOR=${{ matrix.accel }}" >> $GITHUB_ENV
          echo "OLLAMA_ACCELERATION=${{ matrix.accel }}" >> $GITHUB_ENV

      - name: Install deps
        working-directory: src
        run: npm ci

      # ── Build native addon ────────────────────────────────────────────────
      - name: Build native addon (napi)
        working-directory: src
        run: npx napi build --release --manifest-path lib/Cargo.toml --output-dir lib/out

      # ── Compile TypeScript ────────────────────────────────────────────────
      - name: Compile TypeScript
        working-directory: src
        run: npx tsgo

      # ── Bundle Ollama (split out so failures are visible) ─────────────────
      - name: Bundle Ollama
        working-directory: src
        shell: bash
        run: node scripts/bundle-ollama.js

      - name: Verify Ollama bundle
        working-directory: src
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            EXE="vendor/electron-ollama/ollama.exe"
          else
            EXE="vendor/electron-ollama/ollama"
          fi
          if [ ! -f "$EXE" ]; then
            echo "❌ Bundle failed: $EXE not found"
            echo "── vendor tree ──"
            find vendor/electron-ollama -maxdepth 4 | sort || true
            exit 1
          fi
          echo "✅ Ollama bundled: $EXE ($(du -sh "$EXE" | cut -f1))"

      # ── Electron-builder ──────────────────────────────────────────────────
      - name: Build Electron app
        working-directory: src
        run: npx electron-builder --config build.config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}