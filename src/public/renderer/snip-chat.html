<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Screen Snip Chat</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="stylesheet" href="../styles/styles.css" />
		<link
			rel="stylesheet"
			href="../publicvendor/katex/katex.min.css"
			crossorigin="anonymous"
		/>
		<script
			defer
			src="../publicvendor/katex/katex.min.js"
			crossorigin="anonymous"
		></script>
		<script
			defer
			src="../publicvendor/katex/auto-render.min.js"
			crossorigin="anonymous"
		></script>
		<script>
			document.addEventListener("DOMContentLoaded", function () {
				renderMathInElement(document.body, {
					delimiters: [
						{ left: "$$", right: "$$", display: true },
						{ left: "$", right: "$", display: false },
						{ left: "\\(", right: "\\)", display: false },
						{ left: "\\[", right: "\\]", display: true },
					],
					throwOnError: false,
				});
			});
		</script>
		<style>
			:root {
				--snip-bg: #0c1018;
				--snip-surface: rgba(255, 255, 255, 0.06);
				--snip-border: rgba(255, 255, 255, 0.1);
				--snip-accent: #4fc3f7;
				--snip-text: #f5f7fb;
				--snip-muted: rgba(245, 247, 251, 0.62);
			}

			html,
			body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				background: var(--snip-bg);
				color: var(--snip-text);
				font-family:
					"Segoe UI",
					system-ui,
					-apple-system,
					sans-serif;
				overflow-y: hidden;
			}

			#snip-chat {
				display: flex;
				flex-direction: column;
				height: 100%;
				padding: 12px;
				gap: 10px;
				box-sizing: border-box;
			}
			
			.snip-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 10px 12px;
				border-radius: 12px;
				background: var(--snip-surface);
				border: 1px solid var(--snip-border);
			}

			.snip-title {
				font-size: 14px;
				font-weight: 600;
				letter-spacing: 0.02em;
			}

			.snip-status {
				font-size: 11px;
				color: var(--snip-muted);
			}

			.snip-preview {
				display: none;
				border-radius: 12px;
				overflow: hidden;
				border: 1px solid var(--snip-border);
				background: #111522;
			}

			.snip-preview img {
				width: 100%;
				display: block;
			}

			.snip-messages {
				flex: 1;
				overflow-y: auto;
				padding: 8px;
				border-radius: 12px;
				background: rgba(0, 0, 0, 0.2);
				border: 1px solid var(--snip-border);
				display: flex;
				flex-direction: column;
				gap: 10px;
			}

			.snip-bubble {
				padding: 10px 12px;
				border-radius: 12px;
				max-width: 100%;
				font-size: 15px;
				line-height: 1.5;
				background: rgba(255, 255, 255, 0.05);
				border: 1px solid transparent;
			}

			.snip-bubble.user {
				align-self: flex-end;
				background: rgba(79, 195, 247, 0.18);
				border-color: rgba(79, 195, 247, 0.4);
			}

			.snip-bubble.bot {
				align-self: flex-start;
				background: rgba(255, 255, 255, 0.08);
				border-color: rgba(255, 255, 255, 0.08);
			}

			.snip-input {
				position: relative;
				display: flex;
				align-items: center;
				padding: 8px 12px;
				border-radius: 999px;
				background: var(--snip-surface);
				border: 1px solid var(--snip-border);
			}

			.snip-input textarea {
				flex: 1;
				resize: none;
				background: transparent;
				border: none;
				color: var(--snip-text);
				font-size: 13px;
				line-height: 1.2;
				max-height: 60px;
				padding: 0 70px 0 2px;
				outline: none;
				overflow-y: auto;
				height: 18px;
			}

			.snip-input button {
				position: absolute;
				right: 8px;
				top: 50%;
				transform: translateY(-50%);
				border: none;
				background: var(--snip-accent);
				color: #05141f;
				font-size: 11px;
				font-weight: 600;
				padding: 6px 12px;
				border-radius: 999px;
				cursor: pointer;
			}
			.snip-input button:disabled {
				opacity: 0.6;
				cursor: not-allowed;
			}
		</style>
	</head>
	<body>
		<div id="snip-chat">
			<div class="snip-header">
				<div class="snip-title">Screen Snip</div>
				<div class="snip-status" id="snip-status">
					Waiting for capture…
				</div>
			</div>

			<div class="snip-messages" id="snip-messages"></div>

			<form class="snip-input" id="snip-form">
				<textarea
					id="snip-input"
					rows="1"
					placeholder="Ask a follow-up…"
					style="width: 100%;"
				></textarea>
				<button
					type="submit"
					id="snip-send"
					style="max-width: fit-content"
				>
					Send
				</button>
			</form>
		</div>
		<script type="module" src="../scripts/renderer/snip-chat.js"></script>
	</body>
</html>
