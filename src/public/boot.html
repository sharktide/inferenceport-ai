<!DOCTYPE html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Starting InferencePortAI…</title>
		<style>
			:root {
				color-scheme: dark;
			}
			body {
				margin: 0;
				font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
				background: radial-gradient(
						1200px 600px at 20% 20%,
						rgba(13, 120, 207, 0.22),
						transparent 60%
					),
					radial-gradient(
						900px 500px at 80% 60%,
						rgba(140, 60, 255, 0.18),
						transparent 55%
					),
					#0b0f17;
				color: rgba(255, 255, 255, 0.92);
				height: 100vh;
				display: grid;
				place-items: center;
			}
			.card {
				width: min(520px, 92vw);
				padding: 26px 22px;
				border-radius: 14px;
				border: 1px solid rgba(255, 255, 255, 0.12);
				background: rgba(255, 255, 255, 0.06);
				box-shadow: 0 16px 42px rgba(0, 0, 0, 0.35);
				backdrop-filter: blur(10px);
			}
			.row {
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.logo {
				width: 44px;
				height: 44px;
				border-radius: 12px;
				background: linear-gradient(135deg, #0d78cf, #8c3cff);
				box-shadow: 0 10px 30px rgba(13, 120, 207, 0.22);
				flex: 0 0 auto;
			}
			h1 {
				font-size: 18px;
				margin: 0;
				letter-spacing: -0.2px;
				font-weight: 650;
			}
			p {
				margin: 10px 0 0;
				opacity: 0.78;
				font-size: 13px;
				line-height: 1.4;
			}
			.spinner {
				margin-left: auto;
				width: 18px;
				height: 18px;
				border-radius: 999px;
				border: 2px solid rgba(255, 255, 255, 0.25);
				border-top-color: rgba(255, 255, 255, 0.85);
				animation: spin 0.9s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
		</style>
	</head>
	<body>
		<div class="card" role="status" aria-live="polite">
			<div class="row">
				<div class="logo" aria-hidden="true"></div>
				<div>
					<h1>Starting InferencePortAI…</h1>
					<p>Loading services and preparing the UI.</p>
				</div>
				<div class="spinner" aria-hidden="true"></div>
			</div>
		</div>
	</body>
</html>
